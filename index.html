<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paint Locker - 塗料ストック管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
<div class="wrap">

  <header class="app">
    <div class="brand">
      <div class="logo">🎨</div>
      <div>
        <h1>Paint Locker</h1>
        <p>塗料ストック管理 / 市販品・調色をまとめて</p>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><b id="stat-kinds" class="num">0</b><span>種類</span></div>
      <div class="stat"><b id="stat-owned" class="num">0</b><span>所持</span></div>
      <div class="stat"><b id="stat-total" class="num">0</b><span>合計本数</span></div>
    </div>
  </header>

  <!-- ピン留めバー -->
  <div id="pinbar" class="pinbar"></div>

  <!-- ビュー切替タブ -->
  <div class="tabs" id="tabs">
    <button class="tab active" data-view="all">すべて</button>
    <button class="tab" data-view="owned">所持</button>
    <button class="tab" data-view="mix">調色</button>
    <button class="tab" data-view="wanted">欲しい</button>
  </div>

  <!-- 操作ボタン -->
  <div class="toolbar">
    <button class="btn btn-scan" id="open-scan">📷 バーコード読取</button>
    <button class="btn btn-primary" id="open-add">＋ 追加</button>
  </div>

  <!-- フィルタ -->
  <div class="filters">
    <div class="full">
      <label class="fl">名前で検索</label>
      <input id="f-search" placeholder="名前・日本語名・色名・商品番号で絞り込み">
    </div>
    <div>
      <label class="fl">メーカー</label>
      <div class="maker-row">
        <select id="f-maker"><option value="">すべて</option></select>
        <button class="pinstar" id="pin-toggle" title="このメーカーをピン留め">☆</button>
      </div>
    </div>
    <div>
      <label class="fl">シリーズ</label>
      <select id="f-series"><option value="">すべて</option></select>
    </div>
    <div>
      <label class="fl">色の系統</label>
      <select id="f-color"><option value="">すべて</option></select>
    </div>
  </div>

  <div id="list" class="list"></div>
  <div id="loading" class="loading num">読み込み中…</div>

  <footer class="foot">
    <button class="linkbtn" id="import-btn">初期データ取込(CSV)</button>
    <span class="dot">・</span>
    <button class="linkbtn" id="export-btn">バックアップ書き出し(JSON)</button>
    <input type="file" id="import-file" accept=".csv" hidden>
  </footer>
</div>

<!-- 追加・編集モーダル -->
<div class="overlay" id="form-overlay">
  <div class="modal">
    <h2 id="form-title">塗料を追加</h2>
    <input type="hidden" id="edit-id">

    <div class="kindtoggle">
      <button type="button" class="kbtn active" data-kind="product">市販品</button>
      <button type="button" class="kbtn" data-kind="mix">調色（自作）</button>
    </div>

    <div class="field">
      <label class="fl">塗料名 <span class="req">*必須</span></label>
      <input id="i-name" placeholder="例：Tungsten Steel">
    </div>

    <div class="field">
      <label class="fl">日本語名（任意）</label>
      <input id="i-nameja" placeholder="例：タングステンスチール">
    </div>

    <div class="grid2">
      <div class="field">
        <label class="fl">メーカー</label>
        <input id="i-maker" list="maker-list" placeholder="例：GSIクレオス">
        <datalist id="maker-list"></datalist>
      </div>
      <div class="field">
        <label class="fl">シリーズ（任意）</label>
        <input id="i-series" list="series-list" placeholder="例：Mr.カラー">
        <datalist id="series-list"></datalist>
      </div>
    </div>

    <div class="grid2">
      <div class="field">
        <label class="fl">色の系統</label>
        <select id="i-color"></select>
      </div>
      <div class="field">
        <label class="fl">実際の色（任意）</label>
        <div class="colorrow">
          <input type="color" id="i-hex" value="#5dd5c4">
          <button type="button" class="btn btn-ghost small" id="hex-clear">未設定</button>
        </div>
      </div>
    </div>

    <div class="field">
      <label class="fl">商品番号 / カラーコード（任意）</label>
      <input id="i-code" placeholder="例：71.245 / KM003 / K303">
    </div>

    <div class="grid2">
      <div class="field">
        <label class="fl">本数</label>
        <input id="i-qty" type="number" min="0" value="1" class="num">
      </div>
      <div class="field">
        <label class="fl">残量 <span id="rem-val" class="num">100</span>%</label>
        <input id="i-remaining" type="range" min="0" max="100" step="5" value="100">
      </div>
    </div>

    <div class="field wanted-field">
      <label class="chk"><input type="checkbox" id="i-wanted"> 欲しいものリストに入れる</label>
    </div>

    <div class="field" id="barcode-field">
      <label class="fl">バーコード（任意・読取で自動入力）</label>
      <div class="barcoderow">
        <input id="i-barcode" class="num" placeholder="JANコード">
        <button type="button" class="btn btn-scan small" id="form-scan">📷 読取</button>
      </div>
    </div>

    <!-- 配合エディタ（調色のときだけ表示） -->
    <div id="recipe-block" class="recipe-block" hidden>
      <label class="fl">配合（材料・比率・メモ）</label>
      <div id="recipe-rows"></div>
      <button type="button" class="btn btn-ghost small" id="recipe-add">＋ 材料を追加</button>
      <div class="field" style="margin-top:10px;">
        <label class="fl">配合の補足メモ</label>
        <textarea id="i-recipenote" rows="2" placeholder="例：明るめにしたい時は白を1割増し"></textarea>
      </div>
    </div>

    <div class="field">
      <label class="fl">メモ（任意）</label>
      <textarea id="i-note" rows="2" placeholder="使用箇所、買い足しメモなど"></textarea>
    </div>

    <div class="actions">
      <button class="btn btn-ghost" id="form-cancel">キャンセル</button>
      <button class="btn btn-primary" id="form-save">保存</button>
    </div>
  </div>
</div>

<!-- スキャナーモーダル -->
<div class="overlay" id="scan-overlay">
  <div class="modal">
    <h2>バーコードを読み取り</h2>
    <div class="scanhint">
      カメラに塗料のバーコードを映してください。<br>
      登録済みなら一覧で光ります。初めてのコードなら登録画面が開きます。
    </div>
    <div class="scanerr" id="scan-err"></div>
    <div id="reader"></div>
    <div class="actions">
      <button class="btn btn-ghost" id="scan-close" style="flex:1;justify-content:center;">閉じる</button>
    </div>
  </div>
</div>

</body>
</html>
